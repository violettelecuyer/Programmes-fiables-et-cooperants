<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 80vw;
      height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid black;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .controls {
      display: flex;
    }

    #user_name {
      width: 150px;
    }

    #password {
      flex: 1;
    }

    input {
      padding: 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="messages"></div>
    <div class="controls">
      <input id="user_name" placeholder="user name">
      <input id="password" placeholder="password">
    </div>
  </div>
</body>
</html>

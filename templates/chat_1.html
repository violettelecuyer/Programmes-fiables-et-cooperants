<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 80vw;
      height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid black;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .controls {
      display: flex;
    }

    #name {
      width: 150px;
    }

    #msg {
      flex: 1;
    }

    input {
      padding: 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">Logged in as:{{ user_name }} </div>
    <div id="messages"></div>
    <div class="controls">
      <input id="msg" placeholder="message (enter)">
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const msgInput = document.getElementById("msg");

    let lastRendered = "";

    function scrollBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function render(msgs) {
        const newRendered = msgs.map(m =>"[" + m.name + "] " + m.message).join("<br>");

        if (newRendered !== lastRendered) {
            messagesDiv.innerHTML = newRendered;
            lastRendered = newRendered;
            scrollBottom();
        }
    }

    async function poll() {
    const res = await fetch("/poll", {
        credentials: "include"
    });
    console.log("poll status:", res.status, res.url);
    if (!res.ok) {
        console.log("poll failed");
        return;
    }
    const data = await res.json();
    console.log("poll data:", data);
    render(data.messages);
}

    async function send() {
        const message = msgInput.value;
        if (!message) return;

        await fetch("/send", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            credentials: "include",
            body: JSON.stringify({ message })
        });

        msgInput.value = "";
        poll();
    }

    msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
        e.preventDefault();
        send();
        }
    });

    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
